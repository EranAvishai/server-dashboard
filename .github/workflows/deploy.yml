name: Build and Deploy Dashboard

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync repo into app directory
        run: |
          mkdir -p /Users/eranmanolio/apps/server-dashboard
          rsync -az --delete ./ /Users/eranmanolio/apps/server-dashboard/

      - name: Install frontend dependencies
        run: |
          cd /Users/eranmanolio/apps/server-dashboard/frontend
          npm ci

      - name: Build frontend
        run: |
          cd /Users/eranmanolio/apps/server-dashboard/frontend
          npm run build

      - name: Install backend dependencies
        run: |
          cd /Users/eranmanolio/apps/server-dashboard/backend
          npm ci --omit=dev

      - name: Install launchd plist
        run: |
          mkdir -p ~/Library/LaunchAgents
          cp /Users/eranmanolio/apps/server-dashboard/deploy/com.eran.dashboard.plist ~/Library/LaunchAgents/com.eran.dashboard.plist

      - name: Restart dashboard service
        run: |
          launchctl unload ~/Library/LaunchAgents/com.eran.dashboard.plist 2>/dev/null || true
          launchctl load ~/Library/LaunchAgents/com.eran.dashboard.plist

      - name: Health check
        run: |
          for i in {1..10}; do
            if curl -fsS http://127.0.0.1:8787/health; then
              exit 0
            fi
            echo "Waiting for dashboard to start..."
            sleep 3
          done
          echo "Dashboard did not become healthy in time"
          exit 1
